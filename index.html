<div class="grid" id="videoGrid">
  <div class="video-card" data-category="tech" data-title="我的视频">
    <div class="thumb">
      <!-- 
        上传自己的视频后，把 src 改成你的视频路径：
        例如 videos/my-video.mp4
      -->
      <video src="videos/my-video.mp4"></video>

      <div class="placeholder">▶</div>
      <span class="tag">VIDEO</span>
      <span class="duration">00:00</span>
    </div>

    <div class="content">
      <div class="title">我的第一个视频</div>

      <div class="meta">
        <span>0 views</span>
        <span>just now</span>
      </div>

      <div class="like-row">
        <span class="creator">@Lanjinfeng</span>
        <button class="like-btn" onclick="likeVideo(event, this)">♡ 赞</button>
      </div>
    </div>
  </div>
</div>
