<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoHub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      background: #050505;
      border-bottom: 1px solid #222;
      padding: 18px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .logo span {
      background: #ff9900;
      color: #111;
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: 3px;
    }

    .search {
      flex: 1;
      max-width: 520px;
      display: flex;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      padding: 12px 14px;
      font-size: 15px;
    }

    .search button {
      border: none;
      background: #ff9900;
      color: #111;
      font-weight: bold;
      padding: 0 20px;
      cursor: pointer;
    }

    .hero {
      max-width: 1100px;
      margin: 46px auto 28px;
      padding: 0 24px;
    }

    .hero-box {
      background:
        radial-gradient(circle at 80% 20%, rgba(255,153,0,0.35), transparent 28%),
        linear-gradient(135deg, #1a1a1a, #080808);
      border: 1px solid #292929;
      border-radius: 22px;
      padding: 44px;
      overflow: hidden;
    }

    .hero h1 {
      font-size: 52px;
      line-height: 1.05;
      margin-bottom: 18px;
    }

    .hero h1 span {
      color: #ff9900;
    }

    .hero p {
      color: #bdbdbd;
      font-size: 17px;
      line-height: 1.8;
      max-width: 650px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto 70px;
      padding: 0 24px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title h2 {
      font-size: 28px;
    }

    .section-title span {
      color: #ff9900;
      font-weight: bold;
    }

    .video-card {
      width: 100%;
      max-width: 720px;
      background: #181818;
      border: 1px solid #292929;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.25s;
    }

    .video-card:hover {
      transform: translateY(-5px);
      border-color: #ff9900;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .thumb {
      position: relative;
      height: 390px;
      background:
        linear-gradient(135deg, rgba(255,153,0,0.25), rgba(255,153,0,0.02)),
        repeating-linear-gradient(
          45deg,
          #202020 0px,
          #202020 18px,
          #171717 18px,
          #171717 36px
        );
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .thumb::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255,153,0,0.12);
      filter: blur(10px);
    }

    .thumb::after {
      content: "▶";
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #ff9900;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      padding-left: 6px;
      z-index: 2;
      box-shadow: 0 0 40px rgba(255,153,0,0.45);
    }

    .thumb video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    .thumb video:not([src]),
    .thumb video[src=""] {
      display: none;
    }

    .tag {
      position: absolute;
      top: 14px;
      left: 14px;
      background: #ff9900;
      color: #111;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: bold;
      z-index: 3;
    }

    .duration {
      position: absolute;
      right: 14px;
      bottom: 14px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 6px 9px;
      border-radius: 5px;
      font-size: 13px;
      z-index: 3;
    }

    .content {
      padding: 18px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      display: flex;
      gap: 18px;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .creator {
      color: #ff9900;
      font-weight: bold;
    }

    .like-btn {
      background: #252525;
      border: 1px solid #444;
      color: #ddd;
      padding: 9px 14px;
      border-radius: 7px;
      cursor: pointer;
    }

    .like-btn.liked {
      background: #ff9900;
      color: #111;
      border-color: #ff9900;
      font-weight: bold;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 99;
    }

    .modal.show {
      display: flex;
    }

    .player {
      width: min(960px, 100%);
      background: #111;
      border: 1px solid #333;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #ff9900;
      color: #111;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      z-index: 5;
    }

    .player video {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      display: block;
    }

    .player-info {
      padding: 18px;
    }

    .player-info h3 {
      margin-bottom: 8px;
    }

    .player-info p {
      color: #aaa;
      line-height: 1.6;
    }

    footer {
      border-top: 1px solid #222;
      background: #050505;
      color: #777;
      text-align: center;
      padding: 26px;
    }

    @media (max-width: 760px) {
      .nav {
        flex-direction: column;
        align-items: stretch;
      }

      .search {
        max-width: none;
      }

      .hero h1 {
        font-size: 38px;
      }

      .hero-box {
        padding: 30px;
      }

      .thumb {
        height: 230px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="nav">
      <div class="logo">Video<span>Hub</span></div>

      <div class="search">
        <input type="text" placeholder="搜索你的视频..." />
        <button>搜索</button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-box">
      <h1>我的 <span>视频网站</span></h1>
      <p>
        这里可以放你的个人视频、作品展示、课程内容、项目 Demo 或 Vlog。
        当前页面只保留一个视频预览位置。
      </p>
    </div>
  </section>

  <main>
    <div class="section-title">
      <h2>视频预览</h2>
      <span>1 个视频</span>
    </div>

    <div class="video-card" onclick="openVideo()">
      <div class="thumb">
        <!-- 
          把你的视频放到 videos 文件夹里：
          videos/my-video.mp4

          如果还没上传视频，这里先留空也可以：
          src=""
        -->
        <video src="" muted preload="metadata"></video>

        <span class="tag">VIDEO</span>
        <span class="duration">00:00</span>
      </div>

      <div class="content">
        <div class="title">我的第一个视频</div>

        <div class="meta">
          <span>0 views</span>
          <span>just now</span>
        </div>

        <div class="actions">
          <span class="creator">@Lanjinfeng</span>
          <button class="like-btn" onclick="likeVideo(event, this)">♡ 赞</button>
        </div>
      </div>
    </div>
  </main>

  <div class="modal" id="modal" onclick="closeByBg(event)">
    <div class="player">
      <button class="close" onclick="closeVideo()">×</button>

      <!-- 这里也改成你的视频路径 -->
      <video id="mainVideo" src="" controls></video>

      <div class="player-info">
        <h3>我的第一个视频</h3>
        <p>
          上传视频后，把两个 video 标签里的 src 都改成：
          videos/my-video.mp4
        </p>
      </div>
    </div>
  </div>

  <footer>
    © 2026 VideoHub
  </footer>

  <script>
    const modal = document.getElementById("modal");
    const mainVideo = document.getElementById("mainVideo");

    function openVideo() {
      modal.classList.add("show");
    }

    function closeVideo() {
      modal.classList.remove("show");
      mainVideo.pause();
    }

    function closeByBg(event) {
      if (event.target === modal) {
        closeVideo();
      }
    }

    function likeVideo(event, btn) {
      event.stopPropagation();
      btn.classList.toggle("liked");
      btn.innerText = btn.classList.contains("liked") ? "♥ 已赞" : "♡ 赞";
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeVideo();
      }
    });
  </script>
</body>
</html>
